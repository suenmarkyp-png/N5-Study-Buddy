kind = "web"
previewPath = "/"
title = "Nihongo N5"
version = "1.0.0"
id = "artifacts/nihongo-n5"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22130

[services.development]
run = "pnpm --filter @workspace/nihongo-n5 run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nihongo-n5", "run", "build" ]
publicDir = "artifacts/nihongo-n5/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22130"
BASE_PATH = "/"
